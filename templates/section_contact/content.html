{% load static %}
<section class="section-padding">
  <div class="container-narrow">
    <div class="contact-grid">
      <!-- Form -->
      <div class="anim-section">
        <form id="contact-form">
          <div class="form-group">
            <label class="form-label">Name *</label>
            <input type="text" name="name" placeholder="Your full name" class="form-input" />
            <p id="err-name" class="form-error"></p>
          </div>
          <div class="form-group">
            <label class="form-label">Email *</label>
            <input type="email" name="email" placeholder="your@email.com" class="form-input" />
            <p id="err-email" class="form-error"></p>
          </div>
          <div class="form-group">
            <label class="form-label">Phone</label>
            <input type="tel" name="phone" placeholder="+977 ..." class="form-input" />
          </div>
          <div class="form-group">
            <label class="form-label">Interested In</label>
            <select id="contact-product" name="product" class="form-select">
              <option value="">Select a product (optional)</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Message *</label>
            <textarea id="contact-message" name="message" placeholder="Tell us about your requirements..." rows="5" class="form-textarea"></textarea>
            <p id="err-message" class="form-error"></p>
          </div>
          <button type="submit" class="btn-gold" style="width:100%">Send Inquiry</button>
        </form>

        <div id="thank-you" class="thank-you" style="display:none">
          <div class="thank-you-icon">✓</div>
          <h3 class="heading-md">Thank You!</h3>
          <p class="text-body" style="color:var(--muted-foreground);margin-top:0.75rem">We've received your message and will respond within 24 hours.</p>
        </div>
      </div>

      <!-- Contact Info + Map -->
      <div>
        <div class="anim-section" data-delay="0.1">
          <h3 class="heading-md" style="margin-bottom:1.5rem">Visit Our Workshop</h3>
          <div class="contact-info-item">
            <div class="contact-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z" />
                <circle cx="12" cy="10" r="3" />
              </svg>
            </div>
            <div>
              <p class="label">Address</p>
              <p class="value">Thamel Marg, Kathmandu 44600, Nepal</p>
            </div>
          </div>
          <div class="contact-info-item">
            <div class="contact-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z" />
                <polyline points="22,6 12,13 2,6" />
              </svg>
            </div>
            <div>
              <p class="label">Email</p>
              <a href="mailto:hello@andersenhandicrafts.com" class="value">hello@andersenhandicrafts.com</a>
            </div>
          </div>
          <div class="contact-info-item">
            <div class="contact-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z" />
              </svg>
            </div>
            <div>
              <p class="label">Phone / WhatsApp</p>
              <a href="tel:+97714123456" class="value">+977-1-4123456</a>
            </div>
          </div>
        </div>

        <!-- Map -->
        <div class="anim-section" data-delay="0.2" style="margin-top:2rem">
          <div class="map-embed">
            <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3532.2!2d85.3104!3d27.7172!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x0%3A0x0!2zMjfCsDQzJzAyLjAiTiA4NcKwMTgnMzcuNCJF!5e0!3m2!1sen!2snp!4v1700000000000" allowfullscreen loading="lazy" referrerpolicy="no-referrer-when-downgrade" title="Andersen Handicrafts location in Kathmandu"></iframe>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
