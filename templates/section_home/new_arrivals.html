{% load static %}
<section class="section-padding bg-secondary-half">
  <div class="container-narrow carousel-wrapper">
    <div class="carousel-header">
      <div>
        <p class="text-label anim-section" style="color:var(--muted-foreground);margin-bottom:0.75rem">Just In</p>
        <h2 class="heading-lg anim-section">New Arrivals</h2>
      </div>
      <div class="carousel-nav">
        <button id="carousel-prev" aria-label="Previous">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="15 18 9 12 15 6" />
          </svg>
        </button>
        <button id="carousel-next" aria-label="Next">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="9 18 15 12 9 6" />
          </svg>
        </button>
      </div>
    </div>
    <div id="carousel-track" class="carousel-track no-scrollbar"></div>
  </div>
</section>
