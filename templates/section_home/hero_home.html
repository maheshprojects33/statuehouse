{% load static %}
<section class="hero">
  <img src="{% static 'assets/images/hero_home.png' %}" alt="Handcrafted brass Buddha statues from Nepal" class="hero-bg" />
  <div class="hero-overlay"></div>
  <div class="hero-content">
    <h2 class="heading-xl anim-section" data-delay="0.2">Handcrafted Timeless Beauty from the Himalayas</h2>
    <p class="text-body anim-section" data-delay="0.4">Unique statues in brass, wood, marble & more — each piece shows centuries of Nepali artistry.</p>
    <div class="hero-buttons anim-section" data-delay="0.6">
      <a href="{% url 'gallery' %}" class="btn-gold">Explore Collection</a>
      <a href="{% url 'gallery' %}?filter=new" class="btn-outline-light">View New Arrivals</a>
    </div>
  </div>
</section>
