{% load static %}
<section class="section-padding">
  <div class="container-narrow">
    <div class="text-center anim-section" style="margin-bottom:3rem">
      <p class="text-label" style="color:var(--muted-foreground);margin-bottom:0.75rem">Curated Selection</p>
      <h2 class="heading-lg">Our Collection</h2>
    </div>
    <div class="category-grid">
      <a href="gallery.html?category=Buddha" class="category-card anim-section" data-delay="0">
        <img src="{% static 'assets/images/buddha.jpg' %}" alt="Buddha statues collection" loading="lazy" />
        <div class="category-card-overlay"></div>
        <div class="category-card-text">
          <div>
            <h3>Buddha</h3><span>View Collection →</span>
          </div>
        </div>
      </a>
      <a href="gallery.html?category=Deity" class="category-card anim-section" data-delay="0.1">
        <img src="{% static 'assets/images/tara.jpg' %}" alt="Deity statues collection" loading="lazy" />
        <div class="category-card-overlay"></div>
        <div class="category-card-text">
          <div>
            <h3>Tara</h3><span>View Collection →</span>
          </div>
        </div>
      </a>
      <a href="gallery.html?category=Animal" class="category-card anim-section" data-delay="0.2">
        <img src="{% static 'assets/images/guru.jpg' %}" alt="Animal statues collection" loading="lazy" />
        <div class="category-card-overlay"></div>
        <div class="category-card-text">
          <div>
            <h3>Guru</h3><span>View Collection →</span>
          </div>
        </div>
      </a>
      <a href="gallery.html?category=Abstract" class="category-card anim-section" data-delay="0.3">
        <img src="{% static 'assets/images/dzambhala.jpg' %}" alt="Abstract sculptures collection" loading="lazy" />
        <div class="category-card-overlay"></div>
        <div class="category-card-text">
          <div>
            <h3>Dzambhala</h3><span>View Collection →</span>
          </div>
        </div>
      </a>
    </div>
  </div>
</section>
